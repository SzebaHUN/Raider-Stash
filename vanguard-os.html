      if (item.name.includes('Medium')) return 'x80';

      if (item.name.includes('Shotgun')) return 'x20';
      if (item.name.includes('Energy')) return 'x5';
      if (item.name.includes('Launcher')) return 'x20';
      return item.qty ? ('x'+item.qty) : null;

      if (BLUEPRINT_TIERS.A.indexOf(item.name) !== -1) return 700;

  var getMatchingOffer = function(myItem) {
    if (!INVENTORY_DB || !myItem) return null;
    var myScore = getItemScore(myItem);
    var myCat = myItem.category;
    var pool = INVENTORY_DB.filter(function(i){
      return i.name !== myItem.name && i.category === myCat;
    });
    if (pool.length === 0) {

    pool.sort(function(a, b){

  // RNG cost variance - seeded fresh each session, stable per loadout

  var getVariedCost = function(ldId, baseQty) {
    // Hash ldId + item index into a variance: -15% to +20%
    var hash = 0;
    for (var i=0;i<ldId.length;i++) hash = (hash*31 + ldId.charCodeAt(i) + clCostSeed.current) & 0xffff;
    var pct = ((hash % 36) - 15) / 100; // -15% to +20%
    return Math.max(1, Math.round(baseQty * (1 + pct)));
  };
  var getVariedCosts = function(ld) {
    return ld.cost.map(function(c, idx) {
      var hash = 0; var key = ld.id + idx;
      for (var i=0;i<key.length;i++) hash = (hash*31 + key.charCodeAt(i) + clCostSeed.current) & 0xffff;
      var pct = ((hash % 36) - 15) / 100;
      return { item: c.item, qty: Math.max(1, Math.round(c.qty * (1 + pct))) };
    });
  };
