                          {st === 'upcoming'
                            ? <span style={{fontSize:'0.65rem',color:'#4B5563'}}>?</span>
                            : <span>🎁</span>}
                        </div>
                        <div className="daily-day-num" style={{color: st==='claimed'?'#10B981': st==='current'?'#F59E0B':'#374151'}}>
                          {st === 'claimed' ? '✓' : st === 'current' ? '●' : `D${day}`}
                        </div>
                        <div className="daily-day-status" style={{color: st==='claimed'?'#10B981': st==='current'?'#F59E0B':'#374151'}}>
                          {st === 'claimed' ? 'DONE' : st === 'current' ? 'NOW' : `DAY ${day}`}
                        </div>
                      </div>
                    </React.Fragment>
                  ); })}
              </div>
            </div>

            <div className="raider-icon-row">
              {RAIDER_MENU.map(m => (
                <button key={m.id} className={`raider-icon-btn ${raiderSection === m.id ? 'active' : ''}`}
                  onClick={() => setRaiderSection(raiderSection === m.id ? null : m.id)}>
                  <span>{m.icon}</span>
                  <span className="raider-icon-label">{m.label.slice(0,6)}</span>
                </button>
              ))}
            </div>
          </div>
         </div>
       )}

       {activeTab === 'DECKS' && (
         <div style={{paddingBottom: '80px'}}>
          <div style={{display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '14px'}}>
            {DECKS.map(d => (
             <div key={d.num} style={{ display: 'flex', overflow: 'hidden', border: d.done ? '1.5px solid #10B981' : '1.5px solid #1f2937', background: 'rgba(11,17,22,0.95)', clipPath: 'polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px)' }}>
               <div style={{ width: '100px', minHeight: '80px', flexShrink: 0, background: 'linear-gradient(135deg,#0d1828 0%,#0a1220 100%)', borderRight: '1px solid #1f2937', display: 'flex', alignItems: 'flex-end', padding: '6px' }}>
                <span style={{ fontFamily:'Orbitron', fontSize: '0.48rem', fontWeight: 700, color: 'rgba(255,255,255,0.3)', letterSpacing: '1px' }}>AR/RD {d.num}</span>
               </div>
               <div style={{ padding: '12px', flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: '4px' }}>
                <div style={{ fontFamily:'Rajdhani', fontSize: '0.9rem', fontWeight: 700, color: '#F59E0B', letterSpacing:'1.5px' }}>{d.name}</div>
                <div style={{ fontFamily:'Rajdhani', fontSize: '0.62rem', color: '#6B7280', letterSpacing: '1px' }}>{d.subtitle}</div>
                {d.done
                  ? <span style={{fontFamily:'Rajdhani', fontSize: '0.62rem', fontWeight: 700, color: '#10B981'}}>COMPLETED</span>
                  : <div style={{display: 'flex', alignItems: 'center', gap: '6px'}}>
                     <div style={{ flex: 1, height: '3px', background: '#1f2937', borderRadius: '2px', overflow: 'hidden' }}>
                      <div style={{width: d.pct + '%', height: '100%', background: '#F59E0B', borderRadius: '2px'}} />
                     </div>
                     <span style={{fontFamily:'Rajdhani', fontSize: '0.62rem', color: '#F59E0B', fontWeight: 700}}>{d.pct}%</span>
                   </div> }
               </div>
             </div>
            ))}
          </div>
          <div style={{ background: 'rgba(11,17,22,0.9)', border: '1px solid #1f2937', padding: '12px', clipPath: 'polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '6px', paddingBottom: '10px', marginBottom: '6px', borderBottom: '1px solid #1f2937' }}>
             <span>⏱</span>
             <span style={{fontFamily:'Orbitron', fontSize: '0.9rem', fontWeight: 700, color: '#F59E0B'}}>15:06:52</span>
             <span style={{marginLeft: 'auto', fontFamily:'Rajdhani', fontSize: '0.68rem', color: '#6B7280'}}>Rerolls: 3</span>
            </div>
            {DECK_CHALLENGES.map((ch, i) => (
             <div key={i} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 0', borderBottom: i < DECK_CHALLENGES.length - 1 ? '1px solid #0c151e' : 'none', gap: '8px' }}>
               <span style={{ fontFamily:'Rajdhani', fontSize: '0.75rem', color: ch.done ? '#10B981' : '#9CA3AF' }}>{ch.done ? '✓ ' : ''}{ch.label}</span>
               <span style={{ fontFamily:'Rajdhani', fontSize: '0.72rem', fontWeight: 700, color: '#F59E0B', flexShrink: 0 }}>⬡ {ch.pts}</span>
             </div>
            ))}
          </div>
         </div>
       )}

      </div>

      {activeTab === 'INVENTORY' && (
       <div className="footer">
         <div className={`weight-display ${parseFloat(calculateWeight()) > 40 ? 'overweight' : ''}`}>
          LOAD: {calculateWeight()}kg / 40kg
         </div>
         <button className="lock-button">LOCK IN LOADOUT</button>
       </div>
      )}

      {craftSheet && (
       <>
         <div className="sheet-overlay" onClick={() => setCraftSheet(null)} />
         <div className="sheet" style={{left: appBounds().left, right: appBounds().right}}>
          <div className="sheet-handle" />
          <div><span className="sheet-tag">{craftSheet.tag}</span><span className={`sheet-tag ${craftSheet.rarity}`}>{craftSheet.rarity}-TIER</span></div>
          <div className="sheet-title">{craftSheet.name}</div>
          <div className="sheet-desc">{craftSheet.desc}</div>
          {craftSheet.resources.length > 0 && (
            <div>
             <div className="sheet-res-label">REQUIRED RESOURCES</div>
             {craftSheet.resources.map((r, i) => (
               <div key={i} className="sheet-res-row">
                <span className="sheet-res-name">{r.name}</span>
                <span className={`sheet-res-count ${r.have >= r.need ? 'ok' : 'no'}`}>{r.have}/{r.need}</span>
               </div>
             ))}
             {!hasAllRes(craftSheet.resources) && <div className="sheet-warn">NOT ENOUGH RESOURCES</div>}
            </div>
          )}
          <button className="sheet-btn sheet-btn-primary" disabled={!hasAllRes(craftSheet.resources)} onClick={() => setCraftSheet(null)}>⚒ CRAFT</button>
          <button className="sheet-btn sheet-btn-secondary" onClick={() => setCraftSheet(null)}>TRACK RESOURCES</button>
         </div>
       </>
      )}

      {traderSheet && (
       <>
         <div className="sheet-overlay" onClick={() => setTraderSheet(null)} />
         <div className="sheet" style={{left: appBounds().left, right: appBounds().right}}>
          <div className="sheet-handle" />
          <div><span className="sheet-tag">{traderSheet.item.tag}</span><span className={`sheet-tag ${traderSheet.item.rarity}`}>{traderSheet.item.rarity}-TIER</span></div>
          <div className="sheet-title">{traderSheet.item.name}</div>
          <div className="sheet-desc">{traderSheet.item.desc}</div>
          {traderSheet.item.stats && (
            <div className="sheet-stats">
             {Object.entries(traderSheet.item.stats).map(([k, v]) => (
               <div key={k}>
                <div className="sheet-stat-label">{k}</div>
                <div className="sheet-stat-bar"><div className="sheet-stat-fill" style={{ width: `${v}%` }} /></div>
               </div>
             ))}
            </div>
          )}
          <div className="sheet-price-row">
            <span className="sheet-price-label">PRICE</span>
            <span className="sheet-price-val">⬡ {traderSheet.item.price.toLocaleString()}</span>
          </div>
          <button className="sheet-btn sheet-btn-primary" onClick={() => setTraderSheet(null)}>PURCHASE</button>
         </div>
       </>
      )}

      {itemActionSheet && (
       <>
         <div className="sheet-overlay" onClick={() => setItemActionSheet(null)} />
         <div className="sheet" style={{left: appBounds().left, right: appBounds().right}}>
          <div className="sheet-handle" />
          <div><span className="sheet-tag">{itemActionSheet.category}</span><span className={`sheet-tag ${itemActionSheet.rarity}`}>{itemActionSheet.rarity}-TIER</span></div>
          <div className="sheet-title">{itemActionSheet.name}</div>
          <div style={{ fontFamily:'Rajdhani', fontSize: '0.75rem', color: '#6B7280', letterSpacing: '1px' }}>{itemActionSheet.weight}kg</div>
          <div className="sheet-action-btns">
            <button className="sheet-action-btn" onClick={() => setItemActionSheet(null)}>♻ RECYCLE</button>
            <button className="sheet-action-btn" onClick={() => setItemActionSheet(null)}>⬡ SELL</button>
            <button className="sheet-action-btn" onClick={() => setItemActionSheet(null)}>◎ TRACK</button>
          </div>
         </div>
       </>
      )}

      {dropdown && (
       <div className="dropdown-overlay" style={{top: dropdown.top, left: dropdown.left, right: dropdown.right}}
         onClick={(e) => e.stopPropagation()}>
         {!dropdown.category ? (
          <>
            <div className="dropdown-header">
             <span className="dropdown-title">SELECT CATEGORY</span>
             <button className="dropdown-close-btn" onClick={() => setDropdown(null)}>×</button>
            </div>
            <div className="dropdown-cat-list">
             {CATEGORIES.filter(c => c.id !== 'ALL').map(cat => (
               <button key={cat.id} className="dropdown-cat-btn"
                onClick={() => setDropdown(d => ({ ...d, category: cat.id }))}>
                <span className="dropdown-cat-btn-icon">{cat.icon}</span>
                {cat.label}
                <span className="dropdown-cat-btn-arrow">›</span>
               </button>
             ))}
            </div>
          </>
         ) : (
          <>
            <div className="dropdown-header">
             <button className="dropdown-back-btn" onClick={() => setDropdown(d => ({ ...d, category: null }))}>‹ BACK</button>
             <span className="dropdown-title">{dropdown.category}</span>
             <button className="dropdown-close-btn" onClick={() => setDropdown(null)}>×</button>
            </div>
            <div className="dropdown-items-grid">
             {getDropdownItems().length === 0
               ? <div className="dropdown-empty">NO ITEMS</div>
               : getDropdownItems().map(item => (
                  <div key={item.id} className={`dropdown-item-card rarity-${item.rarity}`}
                   onClick={() => handleDropdownItemSelect(item)}>
                   <div className="dropdown-item-icon"><img src={`assets/items/${item.icon}.png`} alt={item.name} style={{width:'100%',height:'100%',objectFit:'contain',padding:'6px'}} onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='flex'}} /><div style={{display:'none',width:'100%',height:'100%',alignItems:'center',justifyContent:'center',fontSize:'0.4rem',fontWeight:700,color:'rgba(255,255,255,0.2)',fontFamily:"'Rajdhani',sans-serif",textAlign:'center',lineHeight:1.1}}>{item.sub||item.category}</div></div>
                   <div className="dropdown-item-name">{item.name}</div>
                  </div>
                )) }
            </div>
          </>
         )}
       </div>
      )}

      {dailyRewardOpen && (
        <div className="daily-modal-overlay" onClick={() => setDailyRewardOpen(false)}>
          <div className="daily-modal" onClick={e => e.stopPropagation()}>
            <div className="daily-modal-header">
              <div className="daily-modal-title">DAY 3 REWARD</div>
              <button className="daily-modal-close" onClick={() => setDailyRewardOpen(false)}>✕</button>
            </div>
            <div className="daily-modal-body">
              <video autoPlay playsInline style={{width:'100%',height:'100%',objectFit:'contain',padding:'6px'}}
                onEnded={() => setDailyRewardOpen(false)}>
                <source src="assets/daily-reward.mp4" type="video/mp4" />
              </video>
            </div>
            <div className="daily-modal-footer">
              <div className="daily-modal-sub">DAY 3 OF 7 · LOGIN STREAK</div>
              <button className="sheet-btn sheet-btn-primary" onClick={() => setDailyRewardOpen(false)}>✦ CLAIM REWARD</button>
            </div>
          </div>
        </div>
      )}

    </div>
    </div>
  );
};


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
