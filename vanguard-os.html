      )}

      {dropdown && (
       <div className="dropdown-overlay" style={{top: dropdown.top !== undefined ? dropdown.top : "auto", bottom: dropdown.bottom !== undefined ? dropdown.bottom : "auto", left: dropdown.left, right: dropdown.right, overflow:"hidden", boxSizing:"border-box"}}
         onClick={(e) => e.stopPropagation()}>
         {!dropdown.category ? (
          <>
            <div className="dropdown-header">
             <span className="dropdown-title">SELECT CATEGORY</span>
             <button className="dropdown-close-btn" onClick={() => setDropdown(null)}>×</button>
            </div>
            <div className="dropdown-cat-list">
             {CATEGORIES.filter(c => c.id !== 'ALL').map(cat => (
               <button key={cat.id} className="dropdown-cat-btn"
                onClick={() => setDropdown(d => ({ ...d, category: cat.id }))}>
                <span className="dropdown-cat-btn-icon">{cat.icon}</span>
                {cat.label}
                <span className="dropdown-cat-btn-arrow">›</span>
               </button>
             ))}
            </div>
          </>
         ) : (
          <>
            <div className="dropdown-header">
             <button className="dropdown-back-btn" onClick={() => setDropdown(d => ({ ...d, category: null }))}>‹ BACK</button>
             <span className="dropdown-title">{dropdown.category}</span>
             <button className="dropdown-close-btn" onClick={() => setDropdown(null)}>×</button>
            </div>
            <div className="dropdown-items-grid">
             {getDropdownItems().length === 0
               ? <div className="dropdown-empty">NO ITEMS</div>
               : getDropdownItems().map(item => (
                  <div key={item.id} className={`dropdown-item-card rarity-${item.rarity}`}
                   onClick={() => handleDropdownItemSelect(item)}>
                   <div className="dropdown-item-icon"><img src={`assets/items/${item.icon}.png`} alt={item.name} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='flex'}} /><div style={{display:'none',width:'100%',height:'100%',alignItems:'center',justifyContent:'center',fontSize:'0.4rem',fontWeight:700,color:'rgba(255,255,255,0.2)',fontFamily:"'Rajdhani',sans-serif",textAlign:'center',lineHeight:1.1}}>{item.sub||item.category}</div></div>
                   <div className="dropdown-item-name">{item.name}</div>
                  </div>
                )) }
            </div>
          </>
         )}
       </div>
      )}

      {dailyRewardOpen && (
        <div className="daily-modal-overlay" onClick={() => setDailyRewardOpen(null)}>
          <div className="daily-modal" onClick={e => e.stopPropagation()}>
            <div className="daily-modal-header">
              <div className="daily-modal-title">DAY {dailyRewardOpen} REWARD</div>
              <button className="daily-modal-close" onClick={() => setDailyRewardOpen(null)}>✕</button>
            </div>
            <div className="daily-modal-body">
              <video key={dailyRewardOpen} autoPlay playsInline style={{width:'100%',height:'100%',objectFit:'cover'}}
                onEnded={function(){ setClaimedDays(function(prev){ return prev.indexOf(dailyRewardOpen) === -1 ? prev.concat([dailyRewardOpen]) : prev; }); setDailyRewardOpen(null); }}>
                <source src={`assets/daily-reward${dailyRewardOpen === 4 ? '2' : ''}.mp4`} type="video/mp4" />
              </video>
            </div>
            <div className="daily-modal-footer">
              <div className="daily-modal-sub">DAY {dailyRewardOpen} OF 7 · LOGIN STREAK</div>
              <button className="sheet-btn sheet-btn-primary" onClick={function(){ setClaimedDays(function(prev){ return prev.indexOf(dailyRewardOpen) === -1 ? prev.concat([dailyRewardOpen]) : prev; }); setDailyRewardOpen(null); }}>CLOSE</button>
            </div>
          </div>
        </div>
      )}

    </div>

      {clModalData && (
        <div className="cl-overlay" onClick={function(){ setClModal(null); }}>
          <div className="cl-modal" onClick={function(e){ e.stopPropagation(); }}>
            <div className="cl-modal-handle" />
            <div className="cl-modal-title">{clModalData.name}</div>
            <div className="cl-modal-sub">CRAFT THIS LOADOUT?</div>
            <div className="cl-modal-cost">
              <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:'0.62rem',fontWeight:700,color:'#6B7280',letterSpacing:'2px',marginBottom:'8px'}}>REQUIRED MATERIALS</div>
              {getVariedCosts(clModalData).map(function(c){ return (
                <div key={c.item} className="cl-modal-row">
                  <span className="cl-modal-item">{c.item}</span>
                  <span className="cl-modal-qty">x{c.qty}</span>
                </div>
              ); })}
            </div>
            <div className="cl-modal-btns">
              <button className="cl-modal-btn cl-modal-cancel" onClick={function(){ setClModal(null); }}>CANCEL</button>
              <button className="cl-modal-btn cl-modal-details">FULL DETAILS</button>
              <button className="cl-modal-btn cl-modal-confirm" onClick={function(){ handleCraftLoadout(clModalData); }}>CONFIRM</button>
            </div>
          </div>
        </div>
      )}
    </div>

      {welcomeOpen && (
        <div className="welcome-overlay" onClick={function(){ setWelcomeOpen(false); }}>
          <div className="welcome-modal" onClick={function(e){ e.stopPropagation(); }}>
            <div className="welcome-title">Glad to see you made it back in one piece, Raider.</div>
            <div className="welcome-body">Your daily rewards are waiting.</div>
            <div className="welcome-rewards">
              <div className="welcome-rewards-label">UNCLAIMED REWARDS</div>
              <div className="welcome-rewards-count">2</div>
            </div>
            <button className="welcome-close" onClick={function(){ setWelcomeOpen(false); }}>ENTER BASE</button>
          </div>
        </div>
      )}

      {syncModal && (
        <div style={{position:'fixed',inset:0,zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
          <div style={{background:'#0d1620',border:'1px solid rgba(245,158,11,0.4)',borderRadius:'12px',padding:'24px 32px',textAlign:'center',boxShadow:'0 0 40px rgba(245,158,11,0.15)',animation:'syncFadeIn 0.25s ease'}}>
            <div style={{fontSize:'1.4rem',marginBottom:'6px'}}>✓</div>
            <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:'0.85rem',fontWeight:700,color:'#F59E0B',letterSpacing:'2px',marginBottom:'6px'}}>LOADOUT SYNCED</div>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:'0.75rem',color:'#6B7280',letterSpacing:'1px'}}>Profile updated · Active on next login</div>
          </div>
        </div>
      )}
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<script>
window.addEventListener('load', function() {
  try {
    var src = document.getElementById('app-src').textContent;
    var compiled = Babel.transform(src, {presets:['react']}).code;
    try { eval(compiled); }
    catch(e2) { document.getElementById('root').innerHTML = '<div style="color:#f87171;padding:20px;font-family:monospace;background:#0d0d0d;position:fixed;inset:0;overflow:auto;z-index:9999"><b>RUNTIME ERROR</b><br><br>' + e2.message + '<br><br><pre>' + (e2.stack||'') + '</pre></div>'; }
  } catch(e) { document.getElementById('root').innerHTML = '<div style="color:#f87171;padding:20px;font-family:monospace;background:#0d0d0d;position:fixed;inset:0;overflow:auto;z-index:9999"><b>BABEL ERROR</b><br><br>' + e.message.replace(/</g,'&lt;') + '</div>'; }
});
</script>
</body></html>
